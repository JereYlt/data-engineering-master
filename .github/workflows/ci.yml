name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r fase-00-entorno/requirements.txt
      - name: Lint with Ruff
        run: ruff check fase-00-entorno/app/
      - name: Test with pytest
        run: |
          cd fase-00-entorno
          pytest tests/ --cov=app --cov-fail-under=80
      - name: Build Docker image
        run: docker build -t microservicio-observable:test fase-00-entorno/